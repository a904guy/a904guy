<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" font-family="'Segoe UI', Ubuntu, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0" cy="0" r="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="1" cy="1" r="1">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#30363d" opacity="0.55"/>
    </pattern>
    <clipPath id="frame"><rect width="1200" height="320" rx="16"/></clipPath>
    <style>
      .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
      .line { animation: appear 0.01s linear backwards; }
      .d1 { animation-delay: 0.5s; }  .d2 { animation-delay: 1.1s; }
      .d3 { animation-delay: 1.8s; }  .d4 { animation-delay: 2.5s; }
      .d5 { animation-delay: 3.2s; }  .d6 { animation-delay: 3.9s; }
      .cursor { animation: blink 1.1s steps(1) 4s infinite; }
      .fade { animation: rise 0.9s ease-out backwards; }
      .f1 { animation-delay: 0.05s; } .f2 { animation-delay: 0.2s; }
      .f3 { animation-delay: 0.35s; } .f4 { animation-delay: 0.5s; }
      @keyframes appear { from { opacity: 0; } to { opacity: 1; } }
      @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
      @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="320" fill="#0d1117"/>
    <rect width="1200" height="320" fill="url(#dots)"/>
    <rect width="700" height="320" fill="url(#glowL)"/>
    <rect x="500" width="700" height="320" fill="url(#glowR)"/>

    <!-- left column -->
    <g class="fade f1">
      <text x="70" y="78" class="mono" font-size="15" fill="#22d3ee">~/hawkins.tech $ whoami</text>
    </g>
    <g class="fade f2">
      <text x="68" y="132" font-size="52" font-weight="700" fill="#e6edf3" letter-spacing="-1">Andrew Hawkins</text>
      <rect x="70" y="150" width="400" height="4" rx="2" fill="url(#accent)"/>
    </g>
    <g class="fade f3">
      <text x="70" y="188" font-size="17" font-style="italic" fill="#8b949e">Ever burning for a connection to the technology of tomorrow.</text>
    </g>

    <!-- chips -->
    <g class="fade f4">
      <g class="mono" font-size="13">
        <rect x="70"  y="212" width="82"  height="30" rx="15" fill="none" stroke="#22d3ee" stroke-opacity="0.55"/>
        <text x="111" y="231" fill="#22d3ee" text-anchor="middle">Python</text>
        <rect x="162" y="212" width="82"  height="30" rx="15" fill="none" stroke="#a78bfa" stroke-opacity="0.55"/>
        <text x="203" y="231" fill="#a78bfa" text-anchor="middle">AI / ML</text>
        <rect x="254" y="212" width="112" height="30" rx="15" fill="none" stroke="#2ea043" stroke-opacity="0.6"/>
        <text x="310" y="231" fill="#3fb950" text-anchor="middle">Networking</text>
        <rect x="376" y="212" width="112" height="30" rx="15" fill="none" stroke="#d29922" stroke-opacity="0.6"/>
        <text x="432" y="231" fill="#d29922" text-anchor="middle">Automation</text>
        <rect x="498" y="212" width="118" height="30" rx="15" fill="none" stroke="#f778ba" stroke-opacity="0.55"/>
        <text x="557" y="231" fill="#f778ba" text-anchor="middle">Open&#160;Source</text>
      </g>
      <text x="70" y="280" class="mono" font-size="14" fill="#8b949e">Hawkins.Tech<tspan font-size="10" baseline-shift="30%">&#174;</tspan>, Inc&#160;&#160;<tspan fill="#30363d">|</tspan>&#160;&#160;Jacksonville, FL&#160;&#160;<tspan fill="#30363d">|</tspan>&#160;&#160;<tspan fill="#22d3ee">hawkins.tech</tspan></text>
    </g>

    <!-- terminal card -->
    <g class="fade f2">
      <rect x="710" y="48" width="424" height="224" rx="12" fill="#161b22" stroke="#30363d"/>
      <rect x="710" y="48" width="424" height="36" rx="12" fill="#21262d"/>
      <rect x="710" y="72" width="424" height="12" fill="#21262d"/>
      <circle cx="734" cy="66" r="6" fill="#ff5f57"/>
      <circle cx="754" cy="66" r="6" fill="#febc2e"/>
      <circle cx="774" cy="66" r="6" fill="#28c840"/>
      <text x="922" y="71" class="mono" font-size="12" fill="#8b949e" text-anchor="middle">andy@hawkins.tech: ~</text>

      <g class="mono" font-size="14">
        <text x="732" y="112" class="line d1"><tspan fill="#3fb950">$</tspan><tspan fill="#e6edf3" dx="8">ls ~/projects</tspan></text>
        <text x="732" y="136" class="line d2" fill="#22d3ee">vpn-chainer&#160;&#160;smart-segments&#160;&#160;emolanguage</text>
        <text x="732" y="164" class="line d3"><tspan fill="#3fb950">$</tspan><tspan fill="#e6edf3" dx="8">git log --oneline -1 career</tspan></text>
        <text x="732" y="188" class="line d4" fill="#8b949e"><tspan fill="#d29922">a904guy</tspan> shipping ideas since day one</text>
        <text x="732" y="216" class="line d5"><tspan fill="#3fb950">$</tspan><tspan fill="#e6edf3" dx="8">./build --target future</tspan></text>
        <text x="732" y="240" class="line d6" fill="#3fb950">build complete...&#160;<tspan fill="#22d3ee">http://127.0.0.1:8000</tspan>&#160;&#9679;</text>
        <rect x="732" y="248" width="9" height="16" fill="#22d3ee" class="cursor"/>
      </g>
    </g>

    <!-- accent edge -->
    <rect width="1200" height="4" fill="url(#accent)"/>
  </g>

  <rect x="0.5" y="0.5" width="1199" height="319" rx="16" fill="none" stroke="#30363d"/>
</svg>
